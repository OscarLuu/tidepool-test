<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic-Tac-Toe</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #1a1a2e;
    color: #eee;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 40px 16px;
  }
  h1 { margin: 0 0 8px; font-weight: 600; }
  #status { font-size: 1.2rem; margin-bottom: 20px; min-height: 1.5em; }
  #board {
    display: grid;
    grid-template-columns: repeat(3, 100px);
    grid-template-rows: repeat(3, 100px);
    gap: 8px;
  }
  .cell {
    background: #16213e;
    border: none;
    border-radius: 12px;
    font-size: 3rem;
    font-weight: 700;
    color: #eee;
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .cell:hover:not(:disabled) { background: #0f3460; }
  .cell.x { color: #e94560; }
  .cell.o { color: #53d8fb; }
  .cell:disabled { cursor: default; }
  .cell.win { background: #533483; }
  #reset {
    margin-top: 24px;
    padding: 10px 24px;
    font-size: 1rem;
    border: none;
    border-radius: 8px;
    background: #e94560;
    color: #fff;
    cursor: pointer;
  }
  #reset:hover { background: #ff5c77; }
</style>
</head>
<body>
  <h1>Tic-Tac-Toe</h1>
  <div id="status">Player X's turn</div>
  <div id="board"></div>
  <button id="reset">New Game</button>

<script>
  const board = document.getElementById('board');
  const status = document.getElementById('status');
  const resetBtn = document.getElementById('reset');

  const wins = [
    [0,1,2],[3,4,5],[6,7,8], // rows
    [0,3,6],[1,4,7],[2,5,8], // columns
    [0,4,8],[2,4,6]          // diagonals
  ];

  let cells = [];
  let state, current, over;

  function init() {
    state = Array(9).fill('');
    current = 'X';
    over = false;
    board.innerHTML = '';
    cells = [];
    for (let i = 0; i < 9; i++) {
      const btn = document.createElement('button');
      btn.className = 'cell';
      btn.addEventListener('click', () => play(i));
      board.appendChild(btn);
      cells.push(btn);
    }
    status.textContent = "Player X's turn";
  }

  function play(i) {
    if (over || state[i]) return;
    state[i] = current;
    cells[i].textContent = current;
    cells[i].classList.add(current.toLowerCase());
    cells[i].disabled = true;

    const line = winningLine();
    if (line) {
      over = true;
      line.forEach(idx => cells[idx].classList.add('win'));
      status.textContent = `Player ${current} wins!`;
      cells.forEach(c => c.disabled = true);
      return;
    }
    if (state.every(v => v)) {
      over = true;
      status.textContent = "It's a draw!";
      return;
    }
    current = current === 'X' ? 'O' : 'X';
    status.textContent = `Player ${current}'s turn`;
  }

  function winningLine() {
    return wins.find(([a,b,c]) =>
      state[a] && state[a] === state[b] && state[a] === state[c]);
  }

  resetBtn.addEventListener('click', init);
  init();
</script>
</body>
</html>
